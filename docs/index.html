<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Film Scan Frame Splitter</title>
  <script src="https://cdn.jsdelivr.net/npm/jszip@3.10.1/dist/jszip.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/utif@3.1.0/UTIF.js"></script>
  <style>
    :root {
      color-scheme: light;
      --ink: #1f2933;
      --muted: #627080;
      --line: #d8dee7;
      --panel: #f7f9fb;
      --paper: #ffffff;
      --accent: #c33b32;
      --accent-strong: #9e2b25;
      --green: #23765a;
      --focus: #246bfe;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      background: var(--paper);
      color: var(--ink);
      font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      letter-spacing: 0;
    }

    button,
    input,
    select {
      font: inherit;
    }

    .app {
      display: grid;
      grid-template-columns: minmax(300px, 380px) minmax(0, 1fr);
      min-height: 100vh;
    }

    aside {
      border-right: 1px solid var(--line);
      background: var(--panel);
      padding: 18px;
      overflow-y: auto;
    }

    main {
      display: grid;
      grid-template-rows: auto minmax(0, 1fr);
      min-width: 0;
    }

    header {
      border-bottom: 1px solid var(--line);
      padding: 14px 18px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
    }

    h1 {
      margin: 0;
      font-size: 21px;
      line-height: 1.2;
      font-weight: 720;
    }

    h2 {
      margin: 22px 0 10px;
      font-size: 13px;
      font-weight: 760;
      text-transform: uppercase;
      color: #374250;
    }

    .status {
      color: var(--muted);
      font-size: 13px;
      text-align: right;
    }

    .control {
      margin: 12px 0;
    }

    label {
      display: block;
      font-size: 13px;
      color: #354151;
      margin-bottom: 6px;
      font-weight: 650;
    }

    input[type="file"],
    input[type="number"],
    select {
      width: 100%;
      min-height: 38px;
      border: 1px solid var(--line);
      background: #fff;
      border-radius: 6px;
      color: var(--ink);
      padding: 8px 10px;
    }

    input[type="checkbox"] {
      width: 18px;
      height: 18px;
      accent-color: var(--accent);
    }

    input:focus,
    select:focus,
    button:focus {
      outline: 2px solid var(--focus);
      outline-offset: 2px;
    }

    .row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }

    .actions {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-top: 16px;
    }

    button {
      min-height: 40px;
      border: 1px solid var(--line);
      background: #fff;
      border-radius: 6px;
      color: var(--ink);
      cursor: pointer;
      font-weight: 680;
    }

    button.primary {
      background: var(--accent);
      border-color: var(--accent);
      color: #fff;
    }

    button.primary:hover {
      background: var(--accent-strong);
    }

    button:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    .workspace {
      display: grid;
      grid-template-columns: minmax(0, 1fr) minmax(320px, 470px);
      min-height: 0;
    }

    .preview-wrap {
      position: relative;
      overflow: auto;
      background: #e9edf2;
      min-width: 0;
      display: grid;
      place-items: start center;
      padding: 18px;
    }

    canvas {
      display: block;
      max-width: 100%;
      height: auto;
      background: #fff;
      box-shadow: 0 1px 3px rgba(31, 41, 51, 0.14);
    }

    .empty {
      width: min(760px, 100%);
      min-height: 420px;
      border: 1px dashed #aab4c0;
      background: #fff;
      display: grid;
      place-items: center;
      color: var(--muted);
      text-align: center;
      padding: 28px;
    }

    .editor {
      border-left: 1px solid var(--line);
      padding: 16px;
      overflow: auto;
      background: #fff;
    }

    .table-wrap {
      overflow-x: auto;
      border: 1px solid var(--line);
      border-radius: 6px;
    }

    table {
      border-collapse: collapse;
      width: 100%;
      min-width: 640px;
      font-size: 13px;
    }

    th,
    td {
      border-bottom: 1px solid var(--line);
      padding: 7px;
      text-align: left;
      white-space: nowrap;
    }

    th {
      background: var(--panel);
      color: #344154;
      font-size: 12px;
    }

    tr.selected td {
      background: #fff1ef;
    }

    td input[type="number"] {
      width: 78px;
      min-height: 30px;
      padding: 4px 6px;
    }

    td button {
      min-height: 30px;
      padding: 2px 8px;
    }

    .meta {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      color: var(--muted);
      font-size: 13px;
      margin: 0 0 12px;
    }

    .pill {
      border: 1px solid var(--line);
      border-radius: 999px;
      padding: 4px 8px;
      background: #fff;
    }

    .download {
      display: none;
      margin-top: 12px;
      color: var(--green);
      font-weight: 720;
      text-decoration: none;
    }

    .notice {
      margin-top: 12px;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.45;
    }

    @media (max-width: 1050px) {
      .app,
      .workspace {
        grid-template-columns: 1fr;
      }

      aside,
      .editor {
        border: 0;
        border-bottom: 1px solid var(--line);
      }

      main {
        display: block;
      }
    }
  </style>
</head>
<body>
  <div class="app">
    <aside>
      <h1>Film Scan Frame Splitter</h1>

      <h2>Scan</h2>
      <div class="control">
        <label for="fileInput">Image file</label>
        <input id="fileInput" type="file" accept="image/*,.tif,.tiff">
      </div>

      <h2>Detection</h2>
      <div class="control">
        <label for="aspect">Crop mode</label>
        <select id="aspect">
          <option value="smart">Smart near-3:2 frames</option>
          <option value="detected">Detected photo bounds</option>
          <option value="landscape">Landscape 3:2</option>
          <option value="portrait">Portrait 2:3</option>
        </select>
      </div>
      <div class="row">
        <div class="control">
          <label for="orientation">Strip direction</label>
          <select id="orientation">
            <option value="auto">Auto</option>
            <option value="horizontal">Horizontal</option>
            <option value="vertical">Vertical</option>
          </select>
        </div>
        <div class="control">
          <label for="lanes">Parallel lanes</label>
          <select id="lanes">
            <option value="auto">Auto</option>
            <option value="1">1</option>
            <option value="2">2</option>
            <option value="3">3</option>
            <option value="4">4</option>
          </select>
        </div>
      </div>
      <div class="row">
        <div class="control">
          <label for="frames">Frames per lane</label>
          <input id="frames" type="number" min="0" max="80" value="0">
        </div>
        <div class="control">
          <label for="padding">Padding %</label>
          <input id="padding" type="number" min="-10" max="20" step="0.5" value="0">
        </div>
      </div>
      <div class="control">
        <label for="rowGap">Row gap safety %</label>
        <input id="rowGap" type="number" min="2" max="20" step="1" value="8">
      </div>

      <h2>Export</h2>
      <div class="control">
        <label for="format">Format</label>
        <select id="format">
          <option value="image/png">PNG lossless</option>
          <option value="image/jpeg">JPEG</option>
        </select>
      </div>

      <div class="actions">
        <button id="detectBtn" class="primary" disabled>Detect</button>
        <button id="addBtn" disabled>Add Box</button>
        <button id="exportBtn" class="primary" disabled>Export ZIP</button>
        <button id="resetBtn" disabled>Reset</button>
      </div>

      <a id="downloadLink" class="download" download="film_frames.zip">Download ZIP</a>
      <p class="notice" id="message">Upload a film scan to begin.</p>
    </aside>

    <main>
      <header>
        <div>
          <h1>Crop Preview</h1>
        </div>
        <div class="status" id="status">No image loaded</div>
      </header>

      <section class="workspace">
        <div class="preview-wrap">
          <div class="empty" id="emptyState">Upload a scan, detect frame boxes, adjust values, then export.</div>
          <canvas id="previewCanvas" hidden></canvas>
        </div>

        <div class="editor">
          <div class="meta">
            <span class="pill" id="imageMeta">Image: -</span>
            <span class="pill" id="boxMeta">Frames: 0</span>
          </div>
          <div class="table-wrap">
            <table>
              <thead>
                <tr>
                  <th>On</th>
                  <th>#</th>
                  <th>X</th>
                  <th>Y</th>
                  <th>Width</th>
                  <th>Height</th>
                  <th></th>
                </tr>
              </thead>
              <tbody id="boxTable"></tbody>
            </table>
          </div>
        </div>
      </section>
    </main>
  </div>

  <script>
    const state = {
      image: null,
      imageName: "",
      boxes: [],
      selected: -1,
      scale: 1,
      previewMax: 2200
    };

    const $ = (id) => document.getElementById(id);
    const previewCanvas = $("previewCanvas");
    const ctx = previewCanvas.getContext("2d");

    function luminance(r, g, b) {
      return 0.2126 * r + 0.7152 * g + 0.0722 * b;
    }

    function clamp(value, min, max) {
      return Math.max(min, Math.min(max, value));
    }

    function imageWidth() {
      return state.image ? (state.image.naturalWidth || state.image.width) : 0;
    }

    function imageHeight() {
      return state.image ? (state.image.naturalHeight || state.image.height) : 0;
    }

    function sortedBoxes() {
      return [...state.boxes].sort((a, b) => a.order - b.order);
    }

    function setMessage(text) {
      $("message").textContent = text;
    }

    function drawPreview() {
      if (!state.image) return;
      const img = state.image;
      const width = imageWidth();
      const height = imageHeight();
      state.scale = Math.min(1, state.previewMax / Math.max(width, height));
      previewCanvas.width = Math.max(1, Math.round(width * state.scale));
      previewCanvas.height = Math.max(1, Math.round(height * state.scale));
      ctx.clearRect(0, 0, previewCanvas.width, previewCanvas.height);
      ctx.drawImage(img, 0, 0, previewCanvas.width, previewCanvas.height);

      sortedBoxes().forEach((box, displayIndex) => {
        const originalIndex = state.boxes.indexOf(box);
        const x = box.x * state.scale;
        const y = box.y * state.scale;
        const w = box.width * state.scale;
        const h = box.height * state.scale;
        ctx.lineWidth = Math.max(2, Math.round(Math.min(previewCanvas.width, previewCanvas.height) / 550));
        ctx.strokeStyle = box.enabled ? "#c33b32" : "#818b98";
        ctx.fillStyle = box.enabled ? "#c33b32" : "#818b98";
        if (originalIndex === state.selected) {
          ctx.strokeStyle = "#246bfe";
          ctx.fillStyle = "#246bfe";
        }
        ctx.strokeRect(x, y, w, h);
        const label = String(displayIndex + 1);
        const labelW = 24 + label.length * 8;
        const labelH = 22;
        const labelY = Math.max(0, y - labelH - 2);
        ctx.fillRect(x, labelY, labelW, labelH);
        ctx.fillStyle = "#fff";
        ctx.font = "13px system-ui, sans-serif";
        ctx.fillText(label, x + 7, labelY + 15);
      });
    }

    function updateMeta() {
      if (state.image) {
        $("imageMeta").textContent = `Image: ${imageWidth()} x ${imageHeight()}`;
        $("status").textContent = state.imageName;
      } else {
        $("imageMeta").textContent = "Image: -";
        $("status").textContent = "No image loaded";
      }
      const enabled = state.boxes.filter((box) => box.enabled).length;
      $("boxMeta").textContent = `Frames: ${enabled}`;
      $("exportBtn").disabled = !enabled;
      $("addBtn").disabled = !state.image;
      $("detectBtn").disabled = !state.image;
      $("resetBtn").disabled = !state.image;
    }

    function renderTable() {
      const tbody = $("boxTable");
      tbody.replaceChildren();
      sortedBoxes().forEach((box) => {
        const index = state.boxes.indexOf(box);
        const tr = document.createElement("tr");
        if (index === state.selected) tr.classList.add("selected");
        tr.addEventListener("click", () => {
          state.selected = index;
          render();
        });

        const enabled = document.createElement("input");
        enabled.type = "checkbox";
        enabled.checked = box.enabled;
        enabled.addEventListener("change", () => {
          box.enabled = enabled.checked;
          render();
        });

        tr.appendChild(cell(enabled));
        tr.appendChild(numberCell(box, "order", 1, 999));
        tr.appendChild(numberCell(box, "x", 0, imageWidth() - 1));
        tr.appendChild(numberCell(box, "y", 0, imageHeight() - 1));
        tr.appendChild(numberCell(box, "width", 1, imageWidth()));
        tr.appendChild(numberCell(box, "height", 1, imageHeight()));

        const remove = document.createElement("button");
        remove.textContent = "Delete";
        remove.addEventListener("click", (event) => {
          event.stopPropagation();
          state.boxes.splice(index, 1);
          state.boxes.forEach((item, order) => item.order = order + 1);
          state.selected = -1;
          render();
        });
        tr.appendChild(cell(remove));
        tbody.appendChild(tr);
      });
    }

    function cell(child) {
      const td = document.createElement("td");
      td.appendChild(child);
      return td;
    }

    function numberCell(box, key, min, max) {
      const input = document.createElement("input");
      input.type = "number";
      input.min = min;
      input.max = max;
      input.step = 1;
      input.value = box[key];
      input.addEventListener("change", () => {
        box[key] = Math.round(clamp(Number(input.value) || min, min, max));
        clampBox(box);
        render();
      });
      return cell(input);
    }

    function clampBox(box) {
      const maxW = imageWidth();
      const maxH = imageHeight();
      box.x = Math.round(clamp(box.x, 0, maxW - 1));
      box.y = Math.round(clamp(box.y, 0, maxH - 1));
      box.width = Math.round(clamp(box.width, 1, maxW - box.x));
      box.height = Math.round(clamp(box.height, 1, maxH - box.y));
    }

    function render() {
      $("emptyState").hidden = Boolean(state.image);
      previewCanvas.hidden = !state.image;
      updateMeta();
      renderTable();
      drawPreview();
    }

    function smoothArray(values, windowSize) {
      const radius = Math.max(0, Math.floor(windowSize / 2));
      if (radius < 1) return values.slice();
      const result = new Float32Array(values.length);
      const prefix = new Float32Array(values.length + 1);
      for (let i = 0; i < values.length; i++) {
        prefix[i + 1] = prefix[i] + values[i];
      }
      for (let i = 0; i < values.length; i++) {
        const start = Math.max(0, i - radius);
        const end = Math.min(values.length - 1, i + radius);
        result[i] = (prefix[end + 1] - prefix[start]) / Math.max(1, end - start + 1);
      }
      return result;
    }

    function closeGaps(mask, maxGap) {
      const result = mask.slice();
      let start = -1;
      for (let i = 0; i < result.length; i++) {
        if (!result[i] && start < 0) {
          start = i;
        } else if (result[i] && start >= 0) {
          if (i - start <= maxGap) {
            for (let j = start; j < i; j++) result[j] = true;
          }
          start = -1;
        }
      }
      return result;
    }

    function activeSegments(mask, minLength) {
      const found = [];
      let start = -1;
      for (let i = 0; i < mask.length; i++) {
        if (mask[i] && start < 0) {
          start = i;
        } else if (!mask[i] && start >= 0) {
          if (i - start >= minLength) found.push([start, i]);
          start = -1;
        }
      }
      if (start >= 0 && mask.length - start >= minLength) found.push([start, mask.length]);
      return found;
    }

    function percentile(values, p) {
      const sorted = Array.from(values).sort((a, b) => a - b);
      if (!sorted.length) return 0;
      const index = clamp(Math.round((sorted.length - 1) * p / 100), 0, sorted.length - 1);
      return sorted[index];
    }

    function analyzeImage() {
      const img = state.image;
      const maxSide = 1200;
      const fullWidth = imageWidth();
      const fullHeight = imageHeight();
      const scale = Math.min(1, maxSide / Math.max(fullWidth, fullHeight));
      const canvas = document.createElement("canvas");
      canvas.width = Math.max(1, Math.round(fullWidth * scale));
      canvas.height = Math.max(1, Math.round(fullHeight * scale));
      const c = canvas.getContext("2d", { willReadFrequently: true });
      c.drawImage(img, 0, 0, canvas.width, canvas.height);
      const data = c.getImageData(0, 0, canvas.width, canvas.height).data;
      const whiteColumns = new Float32Array(canvas.width);
      const nonWhiteColumns = new Float32Array(canvas.width);
      const nonWhiteRows = new Float32Array(canvas.height);

      for (let y = 0; y < canvas.height; y++) {
        for (let x = 0; x < canvas.width; x++) {
          const i = (y * canvas.width + x) * 4;
          const lum = luminance(data[i], data[i + 1], data[i + 2]);
          const isWhite = lum > 242;
          if (isWhite) whiteColumns[x] += 1;
          else {
            nonWhiteColumns[x] += 1;
            nonWhiteRows[y] += 1;
          }
        }
      }

      for (let x = 0; x < canvas.width; x++) {
        whiteColumns[x] /= canvas.height;
        nonWhiteColumns[x] /= canvas.height;
      }
      for (let y = 0; y < canvas.height; y++) {
        nonWhiteRows[y] /= canvas.width;
      }

      return {
        scale,
        width: canvas.width,
        height: canvas.height,
        whiteColumns,
        nonWhiteColumns,
        nonWhiteRows,
        data
      };
    }

    function detectVerticalLanes(analysis, forcedLaneCount) {
      if (forcedLaneCount > 0) {
        const lanes = [];
        for (let i = 0; i < forcedLaneCount; i++) {
          lanes.push([analysis.width * i / forcedLaneCount, analysis.width * (i + 1) / forcedLaneCount]);
        }
        return lanes;
      }

      const whiteProfile = smoothArray(analysis.whiteColumns, Math.max(9, Math.round(analysis.width / 65)));
      const gaps = activeSegments(
        Array.from(whiteProfile, (value, index) => value > 0.72 && index > analysis.width * 0.05 && index < analysis.width * 0.95),
        Math.max(20, Math.round(analysis.width / 18))
      );
      const lanes = [];
      let cursor = 0;
      gaps.forEach(([start, end]) => {
        if (start - cursor >= analysis.width * 0.16) lanes.push([cursor, start]);
        cursor = end;
      });
      if (analysis.width - cursor >= analysis.width * 0.16) lanes.push([cursor, analysis.width]);
      if (lanes.length >= 1 && lanes.length <= 4) return lanes;

      const nonWhiteProfile = smoothArray(analysis.nonWhiteColumns, Math.max(9, Math.round(analysis.width / 80)));
      const threshold = Math.max(0.05, percentile(nonWhiteProfile, 20));
      const mask = closeGaps(Array.from(nonWhiteProfile, (value) => value > threshold), Math.max(3, Math.round(analysis.width / 25)));
      const fallback = activeSegments(mask, Math.max(20, Math.round(analysis.width / 8)));
      return fallback.length ? fallback : [[0, analysis.width]];
    }

    function detectHorizontalLanes(analysis, forcedLaneCount) {
      if (forcedLaneCount > 0) {
        const lanes = [];
        for (let i = 0; i < forcedLaneCount; i++) {
          lanes.push([analysis.height * i / forcedLaneCount, analysis.height * (i + 1) / forcedLaneCount]);
        }
        return lanes;
      }
      return [[0, analysis.height]];
    }

    function detectedFrameCount(span, frameAxis, fullAxis, laneCount) {
      if (laneCount > 1) {
        return clamp(Math.round(fullAxis / Math.max(frameAxis * 1.08, 1)), 1, 40);
      }
      return clamp(Math.round(span / Math.max(frameAxis * 1.08, 1)), 1, 40);
    }

    function smartFrameCount(axisLength, laneWidth, laneCount, forcedFrames) {
      if (forcedFrames > 0) return clamp(forcedFrames, 1, 80);
      const nominalHeight = Math.max(1, laneWidth / 1.5);
      const spacingFactor = laneCount > 1 ? 1.08 : 1.30;
      return clamp(Math.round(axisLength / (nominalHeight * spacingFactor)), 1, 40);
    }

    function rowDarkProfile(analysis, x1, x2) {
      const startX = Math.max(0, Math.floor(x1));
      const endX = Math.min(analysis.width, Math.ceil(x2));
      const profile = new Float32Array(analysis.height);
      for (let y = 0; y < analysis.height; y++) {
        let dark = 0;
        let sum = 0;
        let sumSquares = 0;
        for (let x = startX; x < endX; x++) {
          const i = (y * analysis.width + x) * 4;
          const lum = luminance(analysis.data[i], analysis.data[i + 1], analysis.data[i + 2]);
          if (lum < 58) dark += 1;
          sum += lum;
          sumSquares += lum * lum;
        }
        const width = Math.max(1, endX - startX);
        const darkRatio = dark / width;
        const mean = sum / width;
        const variance = Math.max(0, sumSquares / width - mean * mean);
        const std = Math.sqrt(variance);
        let score = darkRatio;
        if (mean > 58) score *= 0.55;
        if (std > 42) score *= 0.55;
        profile[y] = score;
      }
      return profile;
    }

    function separatorBandsForLane(analysis, laneStart, laneEnd) {
      const laneWidth = laneEnd - laneStart;
      const inset = Math.max(2, laneWidth * 0.04);
      const profile = smoothArray(
        rowDarkProfile(analysis, laneStart + inset, laneEnd - inset),
        Math.max(3, Math.round(laneWidth * 0.018))
      );
      const mask = Array.from(profile, (value) => value > 0.86);
      return activeSegments(mask, Math.max(2, Math.round(laneWidth * 0.018)))
        .filter(([start, end]) => end - start <= Math.max(8, laneWidth * 0.28))
        .map(([start, end]) => ({ start, end, center: (start + end) / 2 }));
    }

    function smartVerticalFrameBoxes(analysis, laneStart, laneEnd, laneCount, forcedFrames, rowGapPercent) {
      const laneWidth = laneEnd - laneStart;
      const inset = Math.max(2, laneWidth * (laneCount > 1 ? 0.032 : 0.024));
      const cropWidthPreview = Math.max(8, laneWidth - inset * 2);
      const frames = smartFrameCount(analysis.height, laneWidth, laneCount, forcedFrames);
      const pitchPreview = analysis.height / frames;
      const nearAspectHeight = cropWidthPreview / 1.5;
      const gapFactor = clamp(rowGapPercent || 8, 2, 20) / 100;
      const topInset = Math.max(0.5, pitchPreview * gapFactor * 0.035);
      const bottomInset = Math.max(1, pitchPreview * gapFactor * 0.14);
      const maxHeightPreview = Math.min(pitchPreview * (1 - gapFactor * 0.45), nearAspectHeight * 1.22);
      const minHeightPreview = Math.min(maxHeightPreview, nearAspectHeight * 0.72);
      const x = (laneStart + inset) / analysis.scale;
      const width = cropWidthPreview / analysis.scale;
      const bands = separatorBandsForLane(analysis, laneStart, laneEnd);
      const boundaries = [];

      for (let boundaryIndex = 0; boundaryIndex <= frames; boundaryIndex++) {
        if (boundaryIndex === 0) {
          boundaries.push({ start: 0, end: 0 });
          continue;
        }
        if (boundaryIndex === frames) {
          boundaries.push({ start: analysis.height, end: analysis.height });
          continue;
        }

        const target = boundaryIndex * pitchPreview;
        let best = null;
        let bestDistance = Infinity;
        bands.forEach((band) => {
          const distance = Math.abs(band.center - target);
          if (distance < bestDistance && distance <= pitchPreview * 0.34) {
            best = band;
            bestDistance = distance;
          }
        });

        if (best) {
          boundaries.push(best);
        } else {
          const syntheticHalfGap = Math.max(1, pitchPreview * gapFactor * 0.22);
          boundaries.push({
            start: target - syntheticHalfGap,
            end: target + syntheticHalfGap
          });
        }
      }

      const boxes = [];
      for (let frame = 0; frame < frames; frame++) {
        const slotStart = frame * pitchPreview;
        const slotEnd = (frame + 1) * pitchPreview;
        let top = boundaries[frame].end + topInset;
        let bottom = boundaries[frame + 1].start - bottomInset;
        const intervalCenter = (top + bottom) / 2;
        let height = bottom - top;

        if (height < minHeightPreview || height > maxHeightPreview) {
          height = maxHeightPreview;
          top = intervalCenter - height / 2;
          bottom = intervalCenter + height / 2;
        }

        top = Math.max(slotStart + topInset, top);
        bottom = Math.min(slotEnd - bottomInset, bottom);
        if (bottom - top < minHeightPreview) {
          const center = (slotStart + slotEnd) / 2;
          top = center - maxHeightPreview / 2;
          bottom = center + maxHeightPreview / 2;
        }

        boxes.push({
          x,
          y: top / analysis.scale,
          width,
          height: (bottom - top) / analysis.scale
        });
      }
      return boxes;
    }

    function rowPhotoProfile(analysis, x1, x2) {
      const startX = Math.max(0, Math.floor(x1));
      const endX = Math.min(analysis.width, Math.ceil(x2));
      const profile = new Float32Array(analysis.height);
      for (let y = 0; y < analysis.height; y++) {
        let active = 0;
        for (let x = startX; x < endX; x++) {
          const i = (y * analysis.width + x) * 4;
          if (luminance(analysis.data[i], analysis.data[i + 1], analysis.data[i + 2]) > 36) active += 1;
        }
        profile[y] = active / Math.max(1, endX - startX);
      }
      return profile;
    }

    function columnPhotoProfile(analysis, x1, x2, y1, y2) {
      const startX = Math.max(0, Math.floor(x1));
      const endX = Math.min(analysis.width, Math.ceil(x2));
      const startY = Math.max(0, Math.floor(y1));
      const endY = Math.min(analysis.height, Math.ceil(y2));
      const profile = new Float32Array(Math.max(1, endX - startX));
      for (let x = startX; x < endX; x++) {
        let active = 0;
        for (let y = startY; y < endY; y++) {
          const i = (y * analysis.width + x) * 4;
          if (luminance(analysis.data[i], analysis.data[i + 1], analysis.data[i + 2]) > 36) active += 1;
        }
        profile[x - startX] = active / Math.max(1, endY - startY);
      }
      return { profile, offset: startX };
    }

    function spanFromProfile(profile, threshold, minLength) {
      const mask = closeGaps(Array.from(profile, (value) => value > threshold), Math.max(2, Math.round(minLength * 0.12)));
      const spans = activeSegments(mask, minLength);
      if (!spans.length) return null;
      return [Math.min(...spans.map(([start]) => start)), Math.max(...spans.map(([, end]) => end))];
    }

    function refineVerticalFrame(analysis, laneStart, laneEnd, segmentStart, segmentEnd) {
      const laneWidth = laneEnd - laneStart;
      const inset = Math.max(2, laneWidth * 0.025);
      const baseX1 = laneStart + inset;
      const baseX2 = laneEnd - inset;
      const rowProfile = smoothArray(rowPhotoProfile(analysis, baseX1, baseX2), Math.max(3, Math.round(laneWidth * 0.015)));
      const localRows = rowProfile.slice(Math.max(0, Math.floor(segmentStart)), Math.min(analysis.height, Math.ceil(segmentEnd)));
      const rowThreshold = Math.max(0.08, Math.min(0.35, percentile(localRows, 18) * 0.7));
      const localY = spanFromProfile(localRows, rowThreshold, Math.max(3, Math.round(laneWidth * 0.08)));
      let y1 = segmentStart;
      let y2 = segmentEnd;
      if (localY) {
        y1 = Math.max(segmentStart, segmentStart + localY[0]);
        y2 = Math.min(segmentEnd, segmentStart + localY[1]);
      }

      const columns = columnPhotoProfile(analysis, baseX1, baseX2, y1, y2);
      const smoothedColumns = smoothArray(columns.profile, Math.max(3, Math.round(laneWidth * 0.018)));
      const colThreshold = Math.max(0.08, Math.min(0.5, percentile(smoothedColumns, 20) * 0.75));
      const localX = spanFromProfile(smoothedColumns, colThreshold, Math.max(4, Math.round(laneWidth * 0.35)));
      let x1 = baseX1;
      let x2 = baseX2;
      if (localX && localX[1] - localX[0] >= laneWidth * 0.45) {
        x1 = columns.offset + localX[0];
        x2 = columns.offset + localX[1];
      }

      const pad = Math.max(1, laneWidth * 0.006);
      return {
        x: (x1 - pad) / analysis.scale,
        y: (y1 - pad) / analysis.scale,
        width: (x2 - x1 + pad * 2) / analysis.scale,
        height: (y2 - y1 + pad * 2) / analysis.scale
      };
    }

    function verticalPhotoSegments(analysis, laneStart, laneEnd, forcedFrames) {
      const laneWidth = laneEnd - laneStart;
      const inset = Math.max(2, laneWidth * 0.025);
      const profile = smoothArray(
        rowPhotoProfile(analysis, laneStart + inset, laneEnd - inset),
        Math.max(5, Math.round(laneWidth * 0.035))
      );
      const threshold = Math.max(0.10, Math.min(0.48, percentile(profile, 34) * 0.72));
      const mask = closeGaps(Array.from(profile, (value) => value > threshold), Math.max(4, Math.round(laneWidth * 0.08)));
      let segments = activeSegments(mask, Math.max(12, Math.round(laneWidth * 0.28)))
        .filter(([start, end]) => end - start >= laneWidth * 0.34);

      if (forcedFrames > 0 && segments.length !== forcedFrames) {
        const activeSpan = segments.length
          ? [Math.min(...segments.map(([start]) => start)), Math.max(...segments.map(([, end]) => end))]
          : [0, analysis.height];
        const pitch = (activeSpan[1] - activeSpan[0]) / forcedFrames;
        segments = [];
        for (let i = 0; i < forcedFrames; i++) {
          segments.push([activeSpan[0] + i * pitch, activeSpan[0] + (i + 1) * pitch]);
        }
      }

      if (!segments.length) {
        const estimated = detectedFrameCount(analysis.height, laneWidth * 2 / 3, analysis.height, 1);
        const pitch = analysis.height / estimated;
        for (let i = 0; i < estimated; i++) segments.push([i * pitch, (i + 1) * pitch]);
      }

      return segments;
    }

    function rowSpanForVerticalLane(analysis, laneStart, laneEnd, frameHeight, laneCount) {
      if (laneCount > 1) return [0, analysis.height];
      const startX = Math.max(0, Math.floor(laneStart));
      const endX = Math.min(analysis.width, Math.ceil(laneEnd));
      const profile = new Float32Array(analysis.height);
      for (let y = 0; y < analysis.height; y++) {
        let active = 0;
        for (let x = startX; x < endX; x++) {
          const i = (y * analysis.width + x) * 4;
          if (luminance(analysis.data[i], analysis.data[i + 1], analysis.data[i + 2]) <= 242) active += 1;
        }
        profile[y] = active / Math.max(1, endX - startX);
      }
      const smoothed = smoothArray(profile, Math.max(7, Math.round(frameHeight * 0.04)));
      const threshold = Math.max(0.08, percentile(smoothed, 22));
      const mask = closeGaps(Array.from(smoothed, (value) => value > threshold), Math.max(3, Math.round(frameHeight * 0.08)));
      const spans = activeSegments(mask, Math.max(20, Math.round(frameHeight * 0.35)));
      if (!spans.length) return [0, analysis.height];
      return [Math.min(...spans.map(([start]) => start)), Math.max(...spans.map(([, end]) => end))];
    }

    function detectBoxes() {
      const img = state.image;
      const analysis = analyzeImage();
      const orientationSetting = $("orientation").value;
      const orientation = orientationSetting === "auto"
        ? (imageWidth() >= imageHeight() ? "horizontal" : "vertical")
        : orientationSetting;
      const forcedLanes = $("lanes").value === "auto" ? 0 : Number($("lanes").value) || 1;
      const forcedFrames = Number($("frames").value) || 0;
      const cropMode = $("aspect").value;
      const landscape = cropMode !== "portrait";
      const padding = (Number($("padding").value) || 0) / 100;
      const rowGapPercent = Number($("rowGap").value) || 8;
      const boxes = [];

      if (orientation === "horizontal") {
        const lanes = detectHorizontalLanes(analysis, forcedLanes);
        lanes.forEach(([laneStart, laneEnd]) => {
          const laneHeight = laneEnd - laneStart;
          const cropHeight = laneHeight * 0.9 / analysis.scale;
          const cropWidth = (landscape ? cropHeight * 1.5 : cropHeight / 1.5);
          const frames = forcedFrames || detectedFrameCount(imageWidth(), cropWidth, imageWidth(), lanes.length);
          const pitch = imageWidth() / frames;
          const y = (laneStart + (laneHeight - cropHeight * analysis.scale) / 2) / analysis.scale;
          for (let frame = 0; frame < frames; frame++) {
            const x = frame * pitch + (pitch - cropWidth) / 2;
            boxes.push(makeBox(x, y, cropWidth, cropHeight, boxes.length + 1, padding, img));
          }
        });
      } else {
        const lanes = detectVerticalLanes(analysis, forcedLanes);
        lanes.forEach(([laneStart, laneEnd]) => {
          if (cropMode === "smart") {
            smartVerticalFrameBoxes(analysis, laneStart, laneEnd, lanes.length, forcedFrames, rowGapPercent).forEach((box) => {
              boxes.push(makeBox(box.x, box.y, box.width, box.height, boxes.length + 1, padding, img));
            });
            return;
          }

          if (cropMode === "detected") {
            verticalPhotoSegments(analysis, laneStart, laneEnd, forcedFrames).forEach(([start, end]) => {
              const refined = refineVerticalFrame(analysis, laneStart, laneEnd, start, end);
              boxes.push(makeBox(refined.x, refined.y, refined.width, refined.height, boxes.length + 1, padding, img));
            });
            return;
          }

          const laneWidth = laneEnd - laneStart;
          const apertureInset = Math.max(2, laneWidth * (lanes.length > 1 ? 0.035 : 0.025));
          const cropWidthPreview = Math.max(8, laneWidth - apertureInset * 2);
          const cropHeightPreview = landscape ? cropWidthPreview / 1.5 : cropWidthPreview * 1.5;
          const outerFrameHeightPreview = landscape ? laneWidth / 1.5 : laneWidth * 1.5;
          const [spanStart, spanEnd] = rowSpanForVerticalLane(analysis, laneStart, laneEnd, outerFrameHeightPreview, lanes.length);
          const frames = forcedFrames || detectedFrameCount(spanEnd - spanStart, outerFrameHeightPreview, analysis.height, lanes.length);
          const pitchPreview = (spanEnd - spanStart) / frames;
          const pitch = pitchPreview / analysis.scale;
          const cropWidth = cropWidthPreview / analysis.scale;
          const cropHeight = cropHeightPreview / analysis.scale;
          const x = (laneStart + apertureInset) / analysis.scale;
          for (let frame = 0; frame < frames; frame++) {
            const y = spanStart / analysis.scale + frame * pitch + (pitch - cropHeight) / 2;
            boxes.push(makeBox(x, y, cropWidth, cropHeight, boxes.length + 1, padding, img));
          }
        });
        if (lanes.length > 1) {
          boxes.sort((a, b) => (a.y - b.y) || (a.x - b.x));
          boxes.forEach((box, index) => box.order = index + 1);
        }
      }

      state.boxes = boxes;
      state.selected = boxes.length ? 0 : -1;
      const modeLabel = cropMode === "smart" ? "smart regular frames" : cropMode === "detected" ? "photo bounds" : "fixed aspect";
      setMessage(`Detected ${boxes.length} crop box${boxes.length === 1 ? "" : "es"} using ${modeLabel}.`);
      render();
    }

    function makeBox(x, y, width, height, order, padding, img) {
      const padX = width * padding;
      const padY = height * padding;
      const box = {
        enabled: true,
        order,
        x: Math.round(x - padX),
        y: Math.round(y - padY),
        width: Math.round(width + padX * 2),
        height: Math.round(height + padY * 2)
      };
      state.image = img;
      clampBox(box);
      return box;
    }

    async function exportZip() {
      if (!state.image || !state.boxes.length) return;
      $("exportBtn").disabled = true;
      setMessage("Preparing ZIP...");
      const zip = new JSZip();
      const fmt = $("format").value;
      const ext = fmt === "image/jpeg" ? "jpg" : "png";
      const selected = sortedBoxes().filter((box) => box.enabled);

      for (let i = 0; i < selected.length; i++) {
        const box = selected[i];
        const canvas = document.createElement("canvas");
        canvas.width = box.width;
        canvas.height = box.height;
        const c = canvas.getContext("2d");
        c.drawImage(state.image, box.x, box.y, box.width, box.height, 0, 0, box.width, box.height);
        const blob = await new Promise((resolve) => canvas.toBlob(resolve, fmt, 0.98));
        zip.file(`frame_${String(i + 1).padStart(3, "0")}.${ext}`, blob);
      }

      const zipBlob = await zip.generateAsync({ type: "blob", compression: "STORE" });
      const link = $("downloadLink");
      if (link.href) URL.revokeObjectURL(link.href);
      link.href = URL.createObjectURL(zipBlob);
      link.style.display = "inline-block";
      link.textContent = `Download ZIP (${selected.length} frame${selected.length === 1 ? "" : "s"})`;
      $("exportBtn").disabled = false;
      setMessage("ZIP is ready.");
    }

    function setLoadedImage(source, name) {
      if (state.image && state.image.src && state.image.src.startsWith("blob:")) URL.revokeObjectURL(state.image.src);
      state.image = source;
      state.imageName = name;
      state.boxes = [];
      state.selected = -1;
      $("downloadLink").style.display = "none";
      setMessage("Image loaded.");
      render();
    }

    async function loadTiff(file) {
      if (!window.UTIF) throw new Error("TIFF decoder did not load.");
      setMessage("Decoding TIFF...");
      const buffer = await file.arrayBuffer();
      const ifds = UTIF.decode(buffer);
      if (!ifds.length) throw new Error("No image found in TIFF.");
      UTIF.decodeImage(buffer, ifds[0]);
      const rgba = UTIF.toRGBA8(ifds[0]);
      const width = ifds[0].width;
      const height = ifds[0].height;
      const canvas = document.createElement("canvas");
      canvas.width = width;
      canvas.height = height;
      const c = canvas.getContext("2d");
      c.putImageData(new ImageData(new Uint8ClampedArray(rgba), width, height), 0, 0);
      setLoadedImage(canvas, file.name);
    }

    async function loadBrowserImage(file) {
      const url = URL.createObjectURL(file);
      const img = new Image();
      await new Promise((resolve, reject) => {
        img.onload = resolve;
        img.onerror = reject;
        img.src = url;
      });
      setLoadedImage(img, file.name);
    }

    $("fileInput").addEventListener("change", async (event) => {
      const file = event.target.files[0];
      if (!file) return;
      try {
        const isTiff = /\.(tif|tiff)$/i.test(file.name) || /tiff/i.test(file.type);
        if (isTiff) await loadTiff(file);
        else await loadBrowserImage(file);
      } catch (error) {
        console.error(error);
        setMessage(`Could not load image: ${error.message || error}`);
      }
    });

    $("detectBtn").addEventListener("click", detectBoxes);
    $("exportBtn").addEventListener("click", exportZip);
    $("resetBtn").addEventListener("click", () => {
      state.boxes = [];
      state.selected = -1;
      $("downloadLink").style.display = "none";
      setMessage("Crop boxes cleared.");
      render();
    });
    $("addBtn").addEventListener("click", () => {
      if (!state.image) return;
      const landscape = $("aspect").value === "landscape";
      const width = Math.round(imageWidth() * 0.35);
      const height = Math.round(landscape ? width / 1.5 : width * 1.5);
      const box = {
        enabled: true,
        order: state.boxes.length + 1,
        x: Math.round((imageWidth() - width) / 2),
        y: Math.round((imageHeight() - height) / 2),
        width,
        height
      };
      clampBox(box);
      state.boxes.push(box);
      state.selected = state.boxes.length - 1;
      render();
    });

    previewCanvas.addEventListener("click", (event) => {
      if (!state.image) return;
      const rect = previewCanvas.getBoundingClientRect();
      const x = (event.clientX - rect.left) / state.scale;
      const y = (event.clientY - rect.top) / state.scale;
      let hit = -1;
      state.boxes.forEach((box, index) => {
        if (x >= box.x && x <= box.x + box.width && y >= box.y && y <= box.y + box.height) {
          hit = index;
        }
      });
      state.selected = hit;
      render();
    });

    window.addEventListener("resize", drawPreview);
    render();
  </script>
</body>
</html>
